# truthfirst/docker-compose.yml
version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: truthfirst-postgres
    environment:
      - POSTGRES_USER=truthfirst_user
      - POSTGRES_PASSWORD=TruthFirst@123
      - POSTGRES_DB=truthfirst_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthfirst_user -d truthfirst_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend
  backend:
    build:
      context: ./truthfirst-backend
    container_name: truthfirst-backend
    ports:
      - "8000:8000"
    env_file:
      - ./truthfirst-backend/.env
    environment:
      # Overrides local DB url to point to Docker's internal network
      - DATABASE_URL=postgresql+asyncpg://truthfirst_user:TruthFirst%40123@db:5432/truthfirst_db
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Map uploads folder to your host machine so files survive restarts
      - ./truthfirst-backend/uploads:/app/uploads
      - ./truthfirst-backend/models:/app/models

  # 3. React Frontend
  frontend:
    build:
      context: ./truthfirst-frontend
    container_name: truthfirst-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: